<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — AI Job Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #2D6CDF;
  --blue-l: #5B8FE8;
  --blue-d: #1E4FB8;
  --purple: #6B5BFF;
  --bg: #F7F9FC;
  --card: #FFFFFF;
  --surf: #F1F4F9;
  --border: #E4E8F0;
  --border-h: #C9D2E0;
  --text: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --green: #10B981;
  --red: #EF4444;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  color: var(--text);
}

.page { width: 100%; max-width: 440px; }

.brand {
  text-align: center;
  margin-bottom: 2rem;
  animation: slideDown 0.5s ease both;
}

.logo-row {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.logo-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
}

.logo-mark svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.logo-text {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.logo-text span { color: var(--blue); }

.brand h1 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}

.brand p { font-size: 14px; color: var(--text-2); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
  animation: slideUp 0.5s ease 0.1s both;
}

.error {
  display: flex; align-items: center; gap: 8px;
  background: #FEE2E2;
  border: 1px solid #FECACA;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: #991B1B;
  margin-bottom: 1.25rem;
}

.error svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

.field { margin-bottom: 1rem; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}

.input-wrap { position: relative; }

.input-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  color: var(--text-3);
}

.input-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; display: block; }

input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font: 14px 'Inter', sans-serif;
  padding: 11px 14px 11px 40px;
  outline: none;
  transition: all 0.15s;
}

input:focus {
  border-color: var(--blue);
  background: white;
  box-shadow: 0 0 0 3px rgba(45, 108, 223, 0.1);
}

input::placeholder { color: var(--text-3); }

.btn-primary {
  width: 100%;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font: 600 14px 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
  margin-top: 0.75rem;
}

.btn-primary:hover { background: var(--blue-d); }
.btn-primary:active { transform: scale(0.98); }

.btn-primary svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.alt-link {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 13px;
  color: var(--text-2);
}

.alt-link a { color: var(--blue); font-weight: 500; text-decoration: none; }
.alt-link a:hover { text-decoration: underline; }

.hint { font-size: 12px; color: var(--text-3); margin-top: 4px; }

@keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="page">

  <div class="brand">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
      </div>
      <div class="logo-text">Job<span>Hunter</span></div>
    </div>
    <h1>Create your account</h1>
    <p>Start applying smarter with AI</p>
  </div>

  <div class="card">
    {% if error %}
    <div class="error">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/signup">
      <div class="field">
        <label for="full_name">Full Name</label>
        <div class="input-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <input type="text" id="full_name" name="full_name" placeholder="Saddam Adil" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <div class="input-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <input type="password" id="password" name="password" placeholder="Min 6 characters" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="hint">Use a strong password you'll remember</div>
      </div>

      <button class="btn-primary" type="submit">
        Create Account
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="alt-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
